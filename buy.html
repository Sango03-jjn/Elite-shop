<!DOCTYPE html>
<html>
<head>
    <title>Buy Form - Eliteone Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Checkout Form</h1>

<div class="buy-container">

<form onsubmit="return showMessage()">

    <label>Full Name</label>
    <input type="text" placeholder="Enter your name" required>

    <label>Email</label>
    <input type="email" placeholder="Enter your email" required>

    <label>Select Product</label>
    <select required>
        <option value="null">iPhone 17</option>
        <option>HP Laptop</option>
        <option>Headphones</option>
        <option>Samsung S24</option>
        <option>Other Product</option>
    </select>

    <label>Number of Products</label>
    <input type="number" min="1" value="1" required>

    <label>Delivery Address</label>
    <input type="text" placeholder="Enter your address" required>

    <button class="buy-button" type="submit">Place Order</button>

</form>

<br>
<a href="shop.html">Back to Shop</a>

</div>
<div id="message-box" class="message-box">
    Order placed successfully!
</div>
<script>
function showMessage(){
    document.getElementById("message-box").style.display = "block";

    setTimeout(function(){
        document.getElementById("message-box").style.display = "none";
    }, 3000);

    return false;
}
</script>
</body>
</html>
