<!DOCTYPE html>
<html>
<head>
    <title>Buy Form - Eliteone Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Checkout Form</h1>
    <div id="message-box" class="message-box">
    ✅ Order placed successfully!
</div>

<div class="buy-container">

<form onsubmit="return placeOrder()">

    <label>Full Name</label>
    <input type="text" id="buyerName" placeholder="Enter your name" required>

    <label>Email</label>
    <input type="email" id="buyerEmail" placeholder="Enter your email" required>

    <label>Product</label>
    <input type="text" id="buyerProduct" readonly>

    <label>Number of Products</label>
    <input type="number" id="buyerQty" min="1" value="1" required>

    <label>Delivery Address</label>
    <input type="text" id="buyerAddress" placeholder="Enter your address" required>

    <button class="buy-button" type="submit">Place Order</button>

</form>

<br>
<a href="shop.html">Back to Shop</a>

</div>



<script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name") || "";
    const price = params.get("price") || "";
    document.getElementById("buyerProduct").value = name + (price ? " - " + Number(price).toLocaleString() + " Frw" : "");

    function placeOrder() {
        const order = {
            id: Date.now(),
            buyerName: document.getElementById("buyerName").value,
            email: document.getElementById("buyerEmail").value,
            product: name,
            price: price,
            quantity: document.getElementById("buyerQty").value,
            address: document.getElementById("buyerAddress").value,
            date: new Date().toLocaleString(),
            status: "new"
        };

        const orders = JSON.parse(localStorage.getItem("orders") || "[]");
        orders.push(order);
        localStorage.setItem("orders", JSON.stringify(orders));

        document.getElementById("message-box").style.display = "block";
        setTimeout(function() {
            document.getElementById("message-box").style.display = "none";
        }, 3000);

        return false;
    }
</script>
</body>
</html>
