<!DOCTYPE html>
<html>
<head>
    <title>Seller Dashboard - ELITE's Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🏪 Seller Dashboard</h1>

<div class="seller-tabs">
    <button onclick="showTab('addTab')" id="btnAdd" class="tab-btn active-tab">➕ Add Product</button>
    <button onclick="showTab('ordersTab')" id="btnOrders" class="tab-btn">📦 Orders <span id="orderBadge" class="badge"></span></button>
</div>

<div id="addTab">
    <div class="seller-box">
        <h2>Add New Product</h2>
        <input type="text" id="prodName" placeholder="Product Name" />
        <input type="number" id="prodPrice" placeholder="Price (Frw)" />
        <label>Product Image</label>
        <input type="file" id="prodImage" accept="image/*" />
        <div id="imagePreview" style="margin:10px 0;"></div>
        <button class="login-btn" onclick="addProduct()">➕ Add Product</button>
        <p class="error-msg" id="errorMsg">⚠️ Please fill in all fields!</p>
    </div>

    <h2>Your Products</h2>
    <div class="product-container" id="productList"></div>
</div>

<div id="ordersTab" style="display:none;">
    <div class="seller-box">
        <h2>📦 Buyer Orders</h2>
        <div id="orderList"></div>
    </div>
</div>

<br>
<button onclick="logout()">🚪 Logout</button>

<script>
    if (sessionStorage.getItem("sellerLoggedIn") !== "true") {
        window.location.href = "index.html";
    }

  
    document.getElementById("prodImage").addEventListener("change", function() {
        const file = this.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById("imagePreview").innerHTML = 
                `<img src="${e.target.result}" style="width:100px; border-radius:8px;">`;
        };
        reader.readAsDataURL(file);
    });

    function showTab(tab) {
        document.getElementById("addTab").style.display = tab === "addTab" ? "block" : "none";
        document.getElementById("ordersTab").style.display = tab === "ordersTab" ? "block" : "none";
        document.getElementById("btnAdd").classList.toggle("active-tab", tab === "addTab");
        document.getElementById("btnOrders").classList.toggle("active-tab", tab === "ordersTab");
    }

    function loadProducts() {
        const products = JSON.parse(localStorage.getItem("products") || "[]");
        const container = document.getElementById("productList");
        container.innerHTML = "";

        if (products.length === 0) {
            container.innerHTML = "<p>No products added yet.</p>";
            return;
        }

        products.forEach(function(p, index) {
            container.innerHTML += `
                <div class="product">
                    <h3>${p.name}</h3>
                    <img src="${p.image}" alt="${p.name}" style="width:100px;">
                    <p>Price: ${Number(p.price).toLocaleString()} Frw</p>
                    <button onclick="deleteProduct(${index})" style="background:red; color:white;">🗑️ Remove</button>
                </div>
            `;
        });
    }

    function loadOrders() {
        const orders = JSON.parse(localStorage.getItem("orders") || "[]");
        const container = document.getElementById("orderList");
        const badge = document.getElementById("orderBadge");
        const newOrders = orders.filter(o => o.status === "new").length;

        badge.textContent = newOrders > 0 ? newOrders : "";

        if (orders.length === 0) {
            container.innerHTML = "<p>No orders yet.</p>";
            return;
        }

        container.innerHTML = "";
        orders.slice().reverse().forEach(function(o, i) {
            const realIndex = orders.length - 1 - i;
            container.innerHTML += `
                <div class="order-card ${o.status === 'done' ? 'order-done' : ''}">
                    <p><b>🛒 Product:</b> ${o.product} — ${Number(o.price).toLocaleString()} Frw</p>
                    <p><b>👤 Buyer:</b> ${o.buyerName} (${o.email})</p>
                    <p><b>📦 Quantity:</b> ${o.quantity}</p>
                    <p><b>📍 Address:</b> ${o.address}</p>
                    <p><b>🕐 Date:</b> ${o.date}</p>
                    <p><b>Status:</b> ${o.status === 'done' ? '✅ Done' : '🔴 New'}</p>
                    ${o.status === 'new' ? `<button onclick="markDone(${realIndex})" style="background:green;color:white;">✅ Mark as Done</button>` : ''}
                </div>
            `;
        });
    }

    function addProduct() {
        const name = document.getElementById("prodName").value.trim();
        const price = document.getElementById("prodPrice").value.trim();
        const fileInput = document.getElementById("prodImage");
        const errorMsg = document.getElementById("errorMsg");

        if (!name || !price || !fileInput.files[0]) {
            errorMsg.style.display = "block";
            return;
        }

        errorMsg.style.display = "none";

        const reader = new FileReader();
        reader.onload = function(e) {
            const products = JSON.parse(localStorage.getItem("products") || "[]");
            products.push({ name, price, image: e.target.result });
            localStorage.setItem("products", JSON.stringify(products));

            document.getElementById("prodName").value = "";
            document.getElementById("prodPrice").value = "";
            document.getElementById("prodImage").value = "";
            document.getElementById("imagePreview").innerHTML = "";

            loadProducts();
        };
        reader.readAsDataURL(fileInput.files[0]);
    }

    function deleteProduct(index) {
        const products = JSON.parse(localStorage.getItem("products") || "[]");
        products.splice(index, 1);
        localStorage.setItem("products", JSON.stringify(products));
        loadProducts();
    }

    function markDone(index) {
        const orders = JSON.parse(localStorage.getItem("orders") || "[]");
        orders[index].status = "done";
        localStorage.setItem("orders", JSON.stringify(orders));
        loadOrders();
    }

    function logout() {
        sessionStorage.removeItem("sellerLoggedIn");
        window.location.href = "index.html";
    }

    loadProducts();
    loadOrders();
</script>

</body>
</html>
